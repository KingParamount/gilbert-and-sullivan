<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wolverton G&amp;S Society — Learn-O-Matic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Work+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="site-nav" aria-label="Wolverton Gilbert &amp; Sullivan Society">
      <a href="https://wolvertongands.co.uk">Home</a>
      <a href="/join-us">Join Us</a>
      <a href="/our-next-show">Our Next Show</a>
    </nav>
    <div class="masthead">
      <img class="crest" src="assets/img/wolverton-gs-logo.jpg"
           alt="Wolverton Gilbert &amp; Sullivan Society">
      <div class="masthead-text">
        <p class="society">Wolverton Gilbert &amp; Sullivan Society</p>
        <h1 class="title">
          <select id="opera-select" class="opera-select" aria-label="Choose an opera"></select>
          <span class="brand" id="brand">Learn-O-Matic</span>
        </h1>
        <p class="tagline">Live music for health and happiness</p>
      </div>
    </div>
    <p id="warming" class="warming" hidden>🎹 Warming up the piano…</p>
  </header>

  <main>
    <section id="stage-part" class="stage">
      <h2>What part would you like to learn today?</h2>
      <div id="part-buttons" class="bigbtns"></div>
    </section>

    <section id="stage-song" class="stage" hidden>
      <div id="crumbs" class="crumbs"></div>
      <h2>Which song would you like to learn?</h2>
      <div id="song-buttons" class="bigbtns"></div>
    </section>

    <section id="stage-player" class="stage" hidden>
      <div id="lyrics" class="lyrics"></div>

      <div class="transport">
        <div class="seekrow">
          <span id="time-now" class="time">0:00</span>
          <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Position in song">
          <span id="time-tot" class="time">0:00</span>
        </div>

        <div class="buttons-main">
          <button id="btn-restart" class="ctl" title="Back to the beginning"><span class="ico">⏮</span><span class="lbl">Restart</span></button>
          <button id="btn-back" class="ctl" title="Jump back 10 seconds"><span class="ico">⏪</span><span class="lbl">Back 10s</span></button>
          <button id="btn-play" class="ctl play"><span class="ico">⏯</span><span class="lbl">Play</span></button>
          <button id="btn-fwd" class="ctl" title="Jump forward 10 seconds"><span class="ico">⏩</span><span class="lbl">Forward 10s</span></button>
        </div>

        <div class="buttons-extra">
          <button id="btn-mute-piano" class="ctl toggle"><span class="ico">🎹</span><span class="lbl">Mute Piano</span></button>
          <button id="btn-play-all" class="ctl toggle"><span class="ico">👥</span><span class="lbl">Play All Parts</span></button>

          <div class="speedbox">
            <span class="speedlabel">Speed</span>
            <div id="speeds" class="speeds">
              <button data-speed="0.5">Slow</button>
              <button data-speed="0.75">Medium</button>
              <button data-speed="1" class="selected">Full</button>
            </div>
          </div>

          <div class="volumes">
            <label class="volctl"><span class="vlabel">🔊 Master volume</span>
              <input id="volume" type="range" min="0" max="1" step="0.05" value="0.85" aria-label="Master volume"></label>
            <label class="volctl"><span class="vlabel">🎹 Accompaniment volume</span>
              <input id="accomp-volume" type="range" min="0" max="1" step="0.05" value="0.7" aria-label="Accompaniment volume"></label>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p id="credit"></p>
    <p class="srcnote">Free software (<a href="https://github.com/KingParamount/gilbert-and-sullivan/blob/main/LICENSE">MIT</a>) — <a href="https://github.com/KingParamount/gilbert-and-sullivan">source code</a>.</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
